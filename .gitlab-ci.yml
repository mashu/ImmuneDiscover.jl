workflow:
  rules:
    - if: $CI_COMMIT_TAG
      variables:
        VERSION: "$CI_COMMIT_TAG"
    - when: always
      variables:
        VERSION: "dev-$CI_COMMIT_SHORT_SHA"

image: julia:1.11.6

variables:
  LINUX_AMD64_BINARY: "immunediscover-ubuntu-x86-64_${VERSION}.tar.gz"
  PACKAGE_REGISTRY_URL: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/immunediscover/${VERSION}"
  JULIA_DEPOT_PATH: "$CI_PROJECT_DIR/.julia"
  JULIA_NUM_THREADS: "auto"

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .julia/
    - .apt/cache/archives/
    - .apt/lists/
  policy: pull-push

.script:
  before_script:
    - "export APT_FLAGS='-o Dir::Cache::archives=$CI_PROJECT_DIR/.apt/cache/archives -o Dir::State::lists=$CI_PROJECT_DIR/.apt/lists -o Acquire::Retries=3'"
    - mkdir -p .apt/cache/archives .apt/lists
    - apt-get $APT_FLAGS update -qq
    - apt-get $APT_FLAGS install -y --no-install-recommends git curl
  script:
    - |
      julia --threads auto --project=@. -e '
        using Pkg
        Pkg.instantiate()
        Pkg.build()
        Pkg.test(coverage=true)'

.coverage:
  coverage: /Test coverage (\d+\.\d+%)/
  after_script:
    - |
      julia --threads auto -e '
        using Pkg
        Pkg.add("Coverage")
        using Coverage
        Codecov.submit(process_folder())
        c, t = get_summary(process_folder())
        using Printf
        @printf "Test coverage %.2f%%\n" 100c / t'

build:
  extends:
    - .script
    - .coverage
  only:
    - main

build_binary:
  timeout: 3h 30m
  extends:
    - .script
  script:
    - apt-get $APT_FLAGS install -y --no-install-recommends clang
    - |
      julia --startup-file=no --threads auto --project=build -e '
        using Pkg
        Pkg.develop(PackageSpec(path=pwd()))
        Pkg.instantiate()
        using PackageCompiler
        create_app(".", "immunediscover", include_transitive_dependencies=false, cpu_target="x86-64")'
    - |
      if [ -z "${VERSION:-}" ]; then VERSION="dev-$(git rev-parse --short HEAD 2>/dev/null || echo local)"; fi
      LINUX_AMD64_BINARY="immunediscover-ubuntu-x86-64_${VERSION}.tar.gz"
      tar cvfz "${LINUX_AMD64_BINARY}" immunediscover
  artifacts:
    paths:
      - immunediscover-ubuntu-x86-64_*.tar.gz
  rules:
    - if: $CI_COMMIT_TAG

pages:
  stage: deploy
  extends:
    - .script
  script:
    - |
      julia --threads auto --project=docs -e '
        using Pkg
        Pkg.develop(PackageSpec(path=pwd()))
        Pkg.instantiate()
        using Documenter: doctest
        using immunediscover
        doctest(immunediscover)
        include("docs/make.jl")'
    - mkdir -p public
    - mv docs/build public/dev
  artifacts:
    paths:
      - public
  only:
    - main

upload:
  stage: upload
  image: curlimages/curl:latest
  needs:
    - job: build_binary
      artifacts: true
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - ls -la
    - |
      FILE=$(ls -1 immunediscover-ubuntu-x86-64_*.tar.gz | head -n1)
      VERSION=${FILE#immunediscover-ubuntu-x86-64_}
      VERSION=${VERSION%.tar.gz}
      URL="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/immunediscover/${VERSION}"
      curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file "${FILE}" "${URL}/${FILE}"
      echo "${FILE}" "${URL}/${FILE}"

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - echo "COMMIT_TAG ${CI_COMMIT_TAG}, CI_JOB_TOKEN ${CI_JOB_TOKEN}"
    - |
      release-cli create --name "Release $CI_COMMIT_TAG" --tag-name $CI_COMMIT_TAG \
        --assets-link "{\"name\":\"${LINUX_AMD64_BINARY}\",\"url\":\"${PACKAGE_REGISTRY_URL}/${LINUX_AMD64_BINARY}\"}"

stages:
  - build
  - build_binary
  - test
  - deploy
  - upload
  - release

